# Stress Scenarios Configuration
# Defines shocks applied to portfolio features to test resilience.

scenarios:
  baseline:
    description: "No shocks applied. Reference state."
    shocks: {}

  mild:
    description: "Mild economic downturn. moderate increase in risk."
    shocks:
      PD_mult: 1.2        # +20% relative PD
      LGD_add: 0.05       # +5% absolute LGD
      RW_mult: 1.1        # +10% RWA density
      collateral_mult: 0.95 # -5% collateral value
      # Implicit: pricing haircuts will react to higher PD/LGD

  severe:
    description: "Severe recession. Significant credit deterioration."
    shocks:
      PD_mult: 1.5        # +50% relative PD
      LGD_add: 0.15       # +15% absolute LGD
      RW_mult: 1.25       # +25% RWA density
      collateral_mult: 0.85 # -15% collateral value
      interest_rate_add: 0.02 # +200bps (if variable)

  pricing_crunch:
    description: "Liquidity crisis. Fire-sale prices collapse."
    shocks:
      bid_haircut_mult: 1.3 # 30% deeper haircuts on NPL pricing logic
